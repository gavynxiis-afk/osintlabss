<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon</title>

<style>
:root {
    --text: #f5f7fa;
    --muted: #8b8f98;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    color: var(--text);

    background:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,255,255,0.04), transparent 50%),
        linear-gradient(180deg, #0b0c10 0%, #06070a 100%);
}

canvas {
    position: absolute;
    inset: 0;
}

.container {
    position: relative;
    z-index: 2;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

h1 {
    font-size: 2.8rem;
    font-weight: 500;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

p {
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 45px;
    transition: all 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.loader {
    width: 220px;
    height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 50px;
    overflow: hidden;
    margin: 0 auto;
}

.loader-bar {
    height: 100%;
    width: 40%;
    background: linear-gradient(90deg, transparent, #ffffff, transparent);
    animation: slide 3.2s ease-in-out infinite;
    opacity: 0.85;
}

@keyframes slide {
    0% { transform: translateX(-120%); }
    50% { transform: translateX(120%); }
    100% { transform: translateX(240%); }
}

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.footer {
    margin-top: 25px;
    font-size: 0.75rem;
    color: rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
    <h1>Coming Soon</h1>
    <p id="subtitle">We’re crafting something clean and precise.</p>

    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <div class="footer">© 2026</div>
</div>

<script>
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

let w, h;
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

const layers = [
    { count: 18, speed: 0.03, size: 0.5, alpha: 0.2 },
    { count: 22, speed: 0.05, size: 0.7, alpha: 0.35 },
    { count: 12, speed: 0.08, size: 1, alpha: 0.5 }
];

let stars = [];

layers.forEach(layer => {
    for (let i = 0; i < layer.count; i++) {
        stars.push({
            x: Math.random() * w,
            y: Math.random() * h,
            vx: (Math.random() - 0.5) * layer.speed,
            vy: (Math.random() - 0.5) * layer.speed,
            size: layer.size,
            alpha: layer.alpha
        });
    }
});

function draw() {
    ctx.clearRect(0, 0, w, h);

    for (let s of stars) {
        s.x += s.vx;
        s.y += s.vy;

        if (s.x < 0) s.x = w;
        if (s.x > w) s.x = 0;
        if (s.y < 0) s.y = h;
        if (s.y > h) s.y = 0;

        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
    }

    requestAnimationFrame(draw);
}

draw();

const lines = [
    "We’re crafting something clean and intentional.",
    "OSINT tools, built for performance and speed."
];

const el = document.getElementById("subtitle");
let index = 0;

function switchText() {
    el.style.opacity = "0";
    el.style.transform = "translateY(6px)";

    setTimeout(() => {
        index = (index + 1) % lines.length;
        el.textContent = lines[index];

        el.style.transform = "translateY(-6px)";

        requestAnimationFrame(() => {
            el.style.opacity = "1";
            el.style.transform = "translateY(0)";
        });
    }, 500);
}

setInterval(switchText, 4000);
</script>

</body>
</html>
